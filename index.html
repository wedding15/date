<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة خاصة 💖</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Canvas Confetti CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* ─── Base Styles & Animated Gradient Background ─── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(-45deg, #fff5f5, #ffe3ec, #e8f0fe, #fff0f5);
      background-size: 400% 400%;
      animation: gradientBg 12s ease infinite;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      padding: 16px;
      user-select: none;
      -webkit-user-select: none;
    }

    @keyframes gradientBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── Floating Hearts Background ─── */
    .heart-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      bottom: -10%;
      font-size: 24px;
      opacity: 0;
      animation: floatUp 8s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-120vh) translateX(50px) rotate(360deg);
        opacity: 0;
      }
    }

    /* ─── Premium Glassmorphic Card ─── */
    .card-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 40px 30px;
      border-radius: 28px;
      box-shadow: 
        0 15px 35px rgba(255, 182, 193, 0.15),
        0 5px 15px rgba(0, 0, 0, 0.04);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Pulsing illustration */
    .illustration-wrapper {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #ffeef2;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(255, 182, 193, 0.25);
      animation: pulseIllust 2s ease-in-out infinite;
    }

    @keyframes pulseIllust {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .illustration-wrapper svg {
      width: 46px;
      height: 46px;
      fill: #ff6584;
    }

    /* Texts */
    .title {
      font-size: 1.45rem;
      font-weight: 800;
      color: #2c2520;
      line-height: 1.6;
    }

    .question {
      font-size: 1.15rem;
      font-weight: 600;
      color: #5d5047;
      line-height: 1.7;
    }

    /* Buttons Container */
    .btn-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      min-height: 55px;
      margin-top: 10px;
      position: relative;
    }

    .btn {
      padding: 12px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Cairo', sans-serif;
    }

    .btn-yes {
      background: linear-gradient(135deg, #ff6584 0%, #ff8da1 100%);
      color: #ffffff;
      box-shadow: 0 6px 15px rgba(255, 101, 132, 0.3);
    }

    .btn-yes:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 101, 132, 0.45);
    }

    .btn-no {
      background: #e6dfd9;
      color: #736961;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      z-index: 999;
    }

    /* ─── Success Reveal Screen ─── */
    .success-content {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .success-content.show {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }

    .success-title {
      font-size: 1.55rem;
      font-weight: 800;
      color: #d64560;
    }

    .success-desc {
      font-size: 1.1rem;
      font-weight: 600;
      color: #5d5047;
      line-height: 1.8;
      max-width: 320px;
    }
  </style>
</head>
<body>

  <!-- Background Hearts -->
  <div class="heart-bg" id="heartBg"></div>

  <!-- Invitation Card -->
  <div class="card-wrapper">
    <div class="card" id="inviteCard">
      
      <!-- Card Initial State -->
      <div id="cardInitial" style="display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%;">
        <div class="illustration-wrapper">
          <svg viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        
        <h1 class="title">كل عام وأنتِ بخير يا أأطيب إنسانة 🌸</h1>
        <p class="question">تشرفيني بروحة الخميس ننبسط ونغير جو؟ 💖</p>
        
        <div class="btn-container">
          <button class="btn btn-yes" id="yesBtn">نعم</button>
          <button class="btn btn-no" id="noBtn">لا</button>
        </div>
      </div>

      <!-- Success Revealed State -->
      <div class="success-content" id="successContent">
        <div class="illustration-wrapper" style="background: #e8fcf0; box-shadow: 0 8px 20px rgba(101, 255, 137, 0.15);">
          <svg viewBox="0 0 24 24" style="fill: #27ae60;">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <h2 class="success-title">يا عيوني! موعدنا الخميس إذن 😍✨</h2>
        <p class="success-desc">
          رح ننبسط كتير ونغير جو سوا 🍕☕🚗
          <br>
          تجهزي ليكون أحلى يوم! 💖
        </p>
      </div>

    </div>
  </div>

  <script>
    // ─── Generate Floating Background Hearts ───
    const heartBg = document.getElementById('heartBg');
    const emojis = ['💖', '❤️', '🌸', '✨', '💕', '💌'];
    
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      
      const size = 16 + Math.random() * 20;
      heart.style.fontSize = size + 'px';
      
      const duration = 6 + Math.random() * 6;
      heart.style.animationDuration = duration + 's';
      
      const delay = Math.random() * 5;
      heart.style.animationDelay = delay + 's';
      
      heartBg.appendChild(heart);
      
      // Remove element after animation completes to free memory
      setTimeout(() => {
        heart.remove();
      }, (duration + delay) * 1000);
    }

    // Spawn initial hearts and set interval
    for (let i = 0; i < 15; i++) {
      createHeart();
    }
    setInterval(createHeart, 800);

    // ─── Fleeing "No" Button Logic ───
    const noBtn = document.getElementById('noBtn');
    
    function moveButton() {
      // Get viewport limits
      const viewWidth = window.innerWidth;
      const viewHeight = window.innerHeight;
      
      // Card elements bounds to prevent overlapping if possible
      const inviteCard = document.getElementById('inviteCard');
      const cardRect = inviteCard.getBoundingClientRect();
      
      let randomX, randomY;
      let safeCount = 0;
      
      // Calculate random positions and ensure they don't fall directly behind the card
      do {
        randomX = 40 + Math.random() * (viewWidth - 140);
        randomY = 40 + Math.random() * (viewHeight - 100);
        safeCount++;
      } while (
        safeCount < 20 &&
        randomX > cardRect.left - 40 &&
        randomX < cardRect.right + 40 &&
        randomY > cardRect.top - 40 &&
        randomY < cardRect.bottom + 40
      );

      // Force fixed positioning and apply coordinates
      noBtn.style.position = 'fixed';
      noBtn.style.transition = 'all 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
    }

    // Attach listeners for both mouse hover and touch drag/start (mobile)
    noBtn.addEventListener('mouseenter', moveButton);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault(); // Prevents click triggering
      moveButton();
    });

    // ─── Yes Button Confetti & Success Reveal Logic ───
    const yesBtn = document.getElementById('yesBtn');
    const inviteCard = document.getElementById('inviteCard');
    const cardInitial = document.getElementById('cardInitial');
    const successContent = document.getElementById('successContent');

    yesBtn.addEventListener('click', () => {
      // 1. Confetti Explosion
      const duration = 5 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        const particleCount = 50 * (timeLeft / duration);
        // Confetti from two sides
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);

      // 2. Hide Initial content and reveal success card
      inviteCard.style.transform = 'scale(0.95)';
      setTimeout(() => {
        cardInitial.style.display = 'none';
        successContent.classList.add('show');
        inviteCard.style.transform = 'scale(1.02)';
      }, 300);
    });
  </script>
</body>
</html>
